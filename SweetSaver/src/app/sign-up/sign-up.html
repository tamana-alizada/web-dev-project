<main>
    <div id="left">
        <p>CREATE ACCOUNT</p>

        <form (ngSubmit)="onSubmit($event)" id="form">
            <label>Name</label>
            <input type="text" name="username" [ngModel]="username()" (ngModelChange)="username.set($event)" placeholder="Full Name">

            <label>Email</label>
            <input type="email" name="email" [ngModel]="email()" (ngModelChange)="email.set($event)" placeholder="Email">

            <label>Password</label>
            <input type="password" name="password" [ngModel]="password()" (ngModelChange)="password.set($event)" placeholder="Password">

            <button type="submit" id="SignUp" [disabled]="loading()">Sign Up</button>

            <p id="have_an_account">
                Already have an account?
                <a routerLink="/SignIn">Sign In</a>
            </p>
        </form>

        <p>{{ message() }}</p>

        <div id="home_icon">
            <a routerLink="/home">
                <img src="https://uxwing.com/wp-content/themes/uxwing/download/web-app-development/home-page-white-icon.png">
            </a>
        </div>
    </div>

    <div id="right">
        <div id="logo">
            <img src="/images/Logo.png" alt="logo">
        </div>

        <div id="body_text">
            <p>Welcome to SweetSaver</p>
        </div>

        <div id="SignIn">
            <button routerLink="/SignIn" type="button">Sign In</button>
        </div>
    </div>
</main>
